project:
  type: website
  render:
    - "**/*.qmd"
    - "!**/resources/*.qmd"
  resources:
    - files/
    - strength-x9f3a7c2e/
    - images/
    - projects/banners/
    - blog/banners/
    - ml-guide/banners/
    - styles/ml-viz.js
    - styles/ml-viz.css
    - styles/explainer.css
    - private/
    - styles/themes.css
    - styles/theme-switch.js
  output-dir: _site

website:
  title: "Kader Mohideen"
  image: images/card.png
  favicon: images/favicon.png
  description: "Cybersecurity solution architect. Notes on security, AI/ML, and emerging defensive tech."
  site-url: https://kader-xai.github.io
  repo-url: https://github.com/kader-xai/kader-xai.github.io
  back-to-top-navigation: false
  twitter-card: true
  open-graph:
    locale: en_US
    image: images/card.png
  page-footer:
    center: "© <span id='footer-year'></span> [Kader Mohideen](https://kader-xai.github.io)"
    border: true
    background: light
  search:
    location: navbar
    type: overlay
    copy-button: true
  navbar:
    left:
      - icon: person-badge
        href: about.qmd
        text: About
      - icon: file-text
        href: blog.qmd
        text: Blog
      - icon: file-bar-graph
        href: projects.qmd
        text: Projects
      - icon: heart-pulse
        href: health.qmd
        text: Health
        target: _blank
      - icon: cpu
        href: https://kader-xai.github.io/lupus/
        text: Lupus
        target: _blank
      - text: Extra
        icon: stars
        menu:
          - icon: mortarboard-fill
            href: ai-interview-prep.qmd
            text: AI Interview Prep
          - icon: mortarboard
            href: ml-simplified.qmd
            text: ML Simplified
          - icon: book
            href: library.qmd
            text: Book References
          - icon: book-half
            href: ml-guide.qmd
            text: "ML Guide"
          - icon: lightbulb
            href: quest-for-agi.qmd
            text: Quest for AGI
          - icon: paperclip
            href: https://kader-xai.github.io/LearningAIPapers/
            text: AI Papers
    right:
      - text: "<i class='fa-brands fa-linkedin'></i>"
        href: https://www.linkedin.com/in/kader-m-1a6023a6/
        target: _blank
      - text: "<i class='fa-brands fa-github'></i>"
        href: https://github.com/kader-xai
        target: _blank

format:
  html:
    toc: true
    toc-depth: 5
    toc-location: left
    lightbox: true
    code-copy: true
    theme: [flatly, styles/styles.scss]
    embed-resources: false
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Cormorant+Garamond:wght@600;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
          <link rel="stylesheet" href="/styles/themes.css">
    link-external-newwindow: true
    link-external-icon: false
    link-external-filter: '^(?:http:|https:)\/\/(?:www\.)?kader-xai\.github\.io'
    include-after-body:
      text: |
        <script src="/styles/styles.js"></script>
        <script src="/styles/theme-switch.js"></script>

execute:
  warning: false
